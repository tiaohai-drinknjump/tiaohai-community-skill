    category: accessibility
    city: 上海
    store: ~
    date: ~
    type: recurring
    summary: >
      上海一位重听（听力障碍）打酒师发起的活动。
      当晚没有音乐，进来不能说话，点酒打字或手写，
      教大家简单手语，还有人带听障朋友跳舞。
