stories:
  - id: nationwide-accessibility-2024
    title: 推进无障碍建设与 NGO 合作
    category: accessibility
    city: ~
    store: ~
    date: "2024"
    type: ongoing
    summary: >
      2024年下半年起，跳海推进无障碍建设，让各种障别的用户都可以进入跳海。
      同时与多个 NGO 组织合作，包括深圳的女工组织。
      创始人梁优表示"最近大半年一直在推"。
    source:
      - url: https://www.36kr.com/p/3074291512914819
        title: '从开酒馆到开酒店，跳海的秘密是"文科生创业"'
    verified: true
    contributed_by: ~

