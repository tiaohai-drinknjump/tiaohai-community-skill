faqs:
  - q: 当打酒师需要会调酒吗？
    a: >
      不需要。95%以上的打酒师没有酒吧行业背景。
      精酿啤酒是从酒头直接打的，门槛比鸡尾酒低很多。
      核心要求是"像在家招待朋友一样招待客人"。

  - q: 打酒师一晚上能赚多少？
    a: >
      基础200元/天，加上0.5%的当日流水提成。
      此外当日酒水免费喝，朋友来了有折扣。

  - q: 打酒师是全职还是兼职？
    a: >
      绝大部分是兼职。跳海每家店只有2名全职员工，
      其余都是兼职打酒师。他们白天有自己的工作，
      晚上来跳海站吧台。

  - q: 怎么排班？
    a: >
      通过飞书应用"抢单"。每天的名额放出来，
      打酒师像抢网约车单一样抢，先到先得。

  - q: 打酒师有什么福利？
    a: >
      当日酒水免费、朋友到店折扣、可以决定当晚播什么音乐、
      参与门店经营决策。最重要的是——认识一群有意思的人。

  - q: 所有城市都能当打酒师吗？
    a: >
      跳海在16+城市有门店，大部分城市都在招打酒师。
      具体可以关注跳海公众号或加入所在城市的微信群了解。
