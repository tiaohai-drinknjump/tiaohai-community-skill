milestones:
  - year: "2019"
    event: >
      梁优在北京鼓楼胡同家中客厅装了三个酒头招待朋友，
      每人100元随便喝，最多一晚来70-90人，微信群涨到500人。
  - year: "2019-08"
    event: >
      签下北京西城区白米斜街首店（原张之洞故居附近）。
      签约当晚喝多了集体跳了后海，由此得名"跳海"。
  - year: "2022"
    event: >
      扩至6座城市11家店（北京4、广州2、深圳2、重庆1、成都1、杭州1）。
      仅2名全职员工，开始借鉴 Web 3.0 去中心化概念运营。
  - year: "2022-09"
    event: 杭州华东首店开业，"造海计划"覆盖北广深、成渝、长三角。
  - year: "2023"
    event: >
      年营收突破1亿元，净利润1000多万，约20家门店。
  - year: "2024-05"
    event: 全国28家直营店。
  - year: "2024-09"
    event: >
      完成数千万元天使轮融资，挑战者创投（元气森林创始人唐彬森旗下）领投，
      无对赌协议，另有三位普通用户跟投。首次接受机构投资。
  - year: "2024-12"
    event: 全国约41家门店，覆盖16个城市。
  - year: "2025-01"
    event: 新加坡海外首店开业（春节前夕），计划东京店、香港店。
  - year: "2025-01"
    event: '"不太土农场"在山东开业，农场概念新业态。'
  - year: "2025-04"
    event: 北京崇文门店开业，北京第12家门店。
  - year: "2025-05"
    event: 跳海×1733沿海公路音乐节，千名打酒师、品牌、艺术家参与。
  - year: "2025-05"
    event: 跳海小程序上线，含打酒成就体系、门店信息、个人地图。
  - year: "2025-06"
    event: 跳海Living青年社区酒店品牌公布，选址深圳南头古城。
  - year: "2026-04"
    event: '梁二狗发布"Agent元年，我们准备拍卖8个AI Demo"，探索AI与跳海结合。'

origin_story: >
  2019年，梁优住在北京鼓楼的胡同里，在自家30平米的客厅装了三个酒头，
  每周开放几晚招待朋友喝酒。100块钱随便喝，来的人越来越多，
  最多一晚上挤进来70多人。微信群从几十人涨到500人。
  后来签下白米斜街的第一家店，签约当晚大家喝高了集体跳了后海。
  "跳海"这个名字就这么来的——不是什么精心策划的品牌命名，
  就是一群人喝多了做的事。

name_origin: >
  签下首店租约当晚，梁优和朋友们喝多了跳进了后海。
  "跳海"这个名字就这么来的。

slogan_origin: >
  "有人跳海"这句口号由跳海发起人之一、摇滚无用电台主播"牌牌"想出，
  源于2019年夏天他们无数个喝醉酒跳入后海的夜晚，
  代表一种决绝的探索、对世界的追问和群体性浪漫。
  "有人跳海"四个字的书法出自上海著名朋克&民谣音乐人、
  前顶楼马戏团主唱陆晨之手。真迹悬挂在北京后海店的房梁之上，
  全国各个跳海店铺都悬挂有复制版本。
  来源：梁二狗2023年4月即刻帖子
  https://m.okjike.com/originalPosts/6436506db99c001fe89d5917

three_values:
  note: 跳海三条价值观（来自播客"创客声亮"和"长谈"完整阐述）
  items:
    - name: 站在背面，承担责任
      description: >
        站在阳光照不到的地方呼唤阳光，站在小众的立场对话主流，
        承担背后这个群体的责任。
    - name: 反对经验
      description: >
        不要有经验依赖和路径依赖，永远以创新态度做事，实事求是面对变化。
    - name: 分享和共创
      description: >
        分享观点、价值、食物、好酒、美好的夜晚，共创更好的未来。
        彼此互为镜子。

