name: 随易
real_name: ~
role: 联合创始人
nickname_origin: '"随易"是做杂志时的笔名'
marital_status: 未婚（与梁二狗一样）

background:
  - >
    2012年加入南方报业旗下《城市画报》做编辑，当时已是纸媒衰落期。
    负责没有其他编辑愿意领的板块：街头文化、滑板、纹身、冲浪、潮流用品——
    现在叫"青年文化"或"亚文化"，当时就是边缘板块。
  - >
    入职半年就去跟陈坤走"行走的力量"贡嘎环线（垭口近5000米海拔）。
  - >
    约2015年创立SoMeet（城市青年活动众包平台），北上广运营，
    年轻人在平台发起8-15人的兴趣活动，团队帮包装润色发布、筛选通知拉群、帮找场地。
    口号："在同事家人之间，有一个去远的关系"。至今仍有人怀念。
    梁二狗当时是SoMeet的市场部副手（随易是一号位）。
  - >
    SoMeet失败后做过"黄色酒馆"（Sour Pop）快闪——
    在方家胡同46号院北平机器隔壁，整个酒馆喷成黄色，主题是"酸"，
    采访20个人关于"酸"的故事+拍每人吃柠檬的照片挂墙上。
    花了近三十万装修，只开两个月卖3000杯酒就拆掉，项目亏损。
  - >
    自己在家开"二手酒馆"做鸡尾酒（二狗开"二狗酒馆"做精酿），
    二手酒馆"人非常多但酒非常难喝"——因为鸡尾酒需要技术且众口难调，
    而啤酒"有手就能打"。这个对比直接验证了精酿啤酒能走通跳海模式。
  - >
    曾运营性情自媒体公众号"食色"，搞过恋爱综艺播客"我们会见面吗"。
  - >
    现在主要驻深圳，负责跳海Living酒店项目。

role_in_tiaohai:
  positioning: >
    内容/文化/品牌端。与梁二狗形成互补——
    二狗做顶层商业设计，随易让事情在跳海发生。
    SoMeet时随易是一号位，跳海翻过来二狗是一号位。
  internal_title: 被内部称为"鼓楼青年文化教父"
  current_focus: >
    负责"跳海社群研究院"项目（为一线同事提供趋势洞察和方法论更新）
    以及跳海Living酒店业务。
  梁二狗评价: >
    "二狗的策划能力跟随易比差远了，但做跳海让它商业化成功——刚刚好"
  personality: >
    策划创意能力极强但不计商业回报。
    越被泼冷水越想做，"病态的对抗心态"。
    反经验主义，鼓励真实。
    自称"酒馆的人类学家"，喜欢在店里四处打量观察。

core_concepts:
  关于公共性: >
    年轻人需要一个"无法自己规划和定义的时间"的去处，
    需要"随机性和偶然性"，在人群中获得"进退自如"的状态。
  关于附近性: >
    "附近、周边、陌生人——全是这些词，但来到这里就变得特别具体，
    变成了街坊、变成了烟火、变成了理发店、变成了无数个很具体的人。"
  关于社区感: >
    "社区感没有稳态，它不是在进步就是在衰败。"需要day-by-day经营。
  关于品牌控制: >
    不是扼杀式控制，而是"允许所有事情发生，然后放大我们更需要发生的事情"。
    空间开业后会被"用户包浆、被时间包浆"。
  关于传播: >
    "让用户看见彼此，我觉得这就已经很跳海了。"
    不宣导体验步骤，而是让用户"有感而发"自行传播。

drinking_preference: >
  自己喝朝日/麒麟，在店里喝最淡的酒（皮尔森、拉格、小麦）。

key_quotes:
  - "让用户看见彼此，我觉得这就已经很跳海了"
  - "社区感没有稳态，它不是在进步就是在衰败"
  - "没有人不需要工作，但是大家都不喜欢上班。工作是你在创造一些东西，上班只是你把你的肉身放在一个地方"
  - "希望大家进到跳海，有点像是进澡堂子——外面的社会身份和title在店里没那么重要"
  - "跳海就是把老板店连锁化了"
  - "打酒师对我们来说是第一性原理"
  - "打动个体的人，才有可能打动更多人"
  - "你能打动自己，你就一定能打动别人"
  - "附近、周边、陌生人——全是词，来到这里变得特别具体"

sources:
  - '播客"创新磁场" Vol.13 对话跳海随易：创造一种新的公共生活'
  - '播客"创造者" 跳海随易：不空谈"附近"这些概念'
  - '播客"创业内幕" S7 Vol.06 跳海酒馆随易：喝酒是最不重要的事'
  - '播客"DTC Lab" 40 先有人后有店'
  - '播客"商业外讲" S4E11/E12'
