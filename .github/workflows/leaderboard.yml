name: 酒量排行榜

on:
  schedule:
    - cron: '0 2 * * 1'  # 每周一 10:00 BJT
  workflow_dispatch:       # 手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Calculate scores and update leaderboard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/leaderboard.py

      - name: Commit and push
        run: |
          git config user.name "tiaohai-bot"
          git config user.email "bot@tiaohai.community"
          git add LEADERBOARD.md
          git diff --cached --quiet || git commit -m "Update leaderboard"
          git push
