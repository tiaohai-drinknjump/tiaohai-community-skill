overview: >
  打酒师是跳海最核心的制度创新。他们不是服务员，更像是临时店长——
  可以招待自己的朋友、决定当晚的音乐、参与经营决策。
  白天他们可能是乐手、设计师、影视制作人、牙医、幼师，
  晚上来跳海站吧台。全国注册打酒师超过9000人，正式全职员工仅约120人。

tiers:
  - level: 1
    name: 实习打酒师
    description: 试用阶段，上岗3次
    promotion: 3次试用通过即转正

  - level: 2
    name: 正式打酒师
    description: 可以独立值班、招待朋友、享受折扣

  - level: 3
    name: 王者打酒师
    description: 最高级别，可参与更多经营决策

compensation:
  base: "底薪150-200元/天"
  commission: "加上当天提成，约200-300元/天"
  perks:
    - "当日酒水免费"
    - "朋友到店享受折扣"
    - "可以决定当晚音乐"
    - "参与经营决策"

how_to_apply:
  steps:
    - "关注跳海公众号或加入所在城市微信群"
    - "了解打酒师制度和要求"
    - "提交申请（具体流程各城市可能略有不同）"
    - "通过3次试用即可成为正式打酒师"
  requirements:
    - "像在家招待朋友一样招待客人"
    - "不需要调酒经验（95%以上打酒师非酒吧行业背景）"
    - "有自己的工作或生活，打酒师是兼职"
  scheduling: >
    通过飞书应用"抢单"上岗，类似网约车抢单，先到先得。

core_principle: >
  "像在家招待朋友一样招待客人，让酒馆有人味儿。"

onboarding_detail:
  note: 来自播客"长谈"和"创客声亮"的详细描述
  first_time: 带你玩，15种酒随便喝，了解收银、杯子、放音乐等基本流程
  second_time: 开始教具体的活
  third_time: 教技术活——冷库换酒、如何让客人开心
  after_three: 转正后开始给薪水
  extra_perks: 有些店有制度，下班时可以打一杯酒带回家
  half_shift: 除了全班还有半班——只上几个小时

origin_story: >
  梁二狗自己不想每天看店，客人总问"二狗在不在店里"，
  于是想"如果一个酒吧有一百个老板，他们的朋友就会冲着他们过去"。
  借鉴了双创时期车库咖啡的模式，也类比区块链挖矿的去中心化逻辑。

real_cases:
  - description: >
      有个互联网媒体销售，业余喜欢解说球赛。
      欧洲杯/世界杯/NBA总决赛期间自己跑到店里，关掉球赛背景音，
      现场拿麦克风解说——这是他小时候的梦想，没机会去央视，
      但可以在跳海做一晚上。
    source: '播客"创客声亮"'
  - description: >
      冬宝，自由撰稿人。离职后成为兼职打酒师。
      "虽然钱不多，但少了许多孤独。"
    source: 晚点周末
  - description: >
      五六十岁的父母被打酒师子女带来当打酒师。
      有60多岁的大学教授也是在册打酒师。
    source: '播客"创客声亮"'
  - description: >
      一位听障打酒师成功融入深圳工作团队。
    source: 新浪科技

industry_impact: >
  打酒师制度已被全国精酿啤酒馆普遍复制，
  但别人只做制度，缺乏社群的深度和价值观支撑。
  梁二狗："现在全行业都在学跳海的兼职打酒师模式，
  但社区的形成不是那么容易复制的。"

demographics:
  age_range: "25-35岁城市白领为主"
  backgrounds: ["互联网", "媒体", "金融", "医生", "律师", "城管", "国企", "老师", "学生", "freelancer", "乐手", "设计师", "影视制作人", "牙医", "幼师", "程序员"]
  note: 很多人把"跳海打酒师"写在简历上
