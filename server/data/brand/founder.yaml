name: 梁优
nickname: 梁二狗
nickname_origin: >
  最早在Someet工作时因比较中二被叫"二优"，
  后来养了两只狗（一只流浪狗一只柴犬），朋友说"二狗更好记"，
  且像一个酒吧老板。写书时考虑署名"梁优"（写作者身份），
  "二狗"是酒吧老板身份。
birth: "1993-07-23（大暑）"
hometown: >
  江苏省盐城市东台市唐洋镇，国营渔场家属楼六层（无电梯无空调）。
  距离海只有20公里。爷爷奶奶是地道农民。
  高三前才有空调（父亲为了让他考好大学装的）。
  来北京只有一趟火车要坐一夜。
education: >
  中国政法大学法学专业。翘掉90%以上的课，但大一拿了奖学金。
  毕业论文写的是股权众筹的法律风险。
  是法大那几年第一个非重大疾病/亲属过世原因特批休学的人，
  休学理由："我想去世界看一看"。辅导员不批，副院长顾永强签字
  （"我女儿在美国也要GAP year，我理解你"）。
  江平校长代表的自由主义传统、罗翔等老师的思想启蒙（康德"人是目的不是手段"）
  对他影响至今。
partner: 随易（合伙人，媒体人出身）
current_residence: >
  昆明翠湖边，月租4000元的老干休所家属院顶层，有露台对着翠湖。
  2025年3月8日离开北京。在拉萨飞昆明选址时，翠湖边拎一瓶酒走，
  身体从海拔四五千下到一千八百的舒畅感，那一刻决定搬昆明。

family:
  father: >
    历史老师，86年中专生（当时含金量高），学习能力极强。
    儿子大三时通过了司法考试。儿子带他去日本后自学日语说得很好。
    一个人在家唱《我的家在东北松花江上》。是自由主义浪漫的人。
    休学创业导致父子拉黑半年以上，后因亲子游项目上新华社报道才和解。
    跳海的媒体报道让父母完全了解了儿子在做什么。
    父母在北京住了一个月，每天骑电动车去不同的跳海店打卡。
  mother: 想通过读书拿到会计岗位，给二狗买电子琴。
  high_school: 镇上中学考了三年第一。自主招生名额是父亲帮忙争取的。

personal_traits:
  晕车: 严重晕车
  瑜伽: 阿斯汤加瑜伽习练者
  游泳: 不会游泳（第一次跳后海发现水只到胸口）
  消费观: 不攒钱，不买奢侈品（穿跳海T恤），花钱在喝好酒、看演出、旅行。银行卡超过十万一定花掉或捐掉
  写作: >
    已签书约，正在写第一本书（曾想叫《西出阳关》）。
    自传式散文，每章以一个地名命名（第一章"张掖"、第二章"昌平"）。
    一周至少五天凌晨12点写到4点，保持每天约4小时写作。
  音乐: 喜欢摇滚乐，李志对他三观影响很大
  电影: >
    最喜欢杨德昌（《一一》每年都看）和保罗索伦蒂诺（《绝美之城》《上帝之手》）。
    跳海投资了电影《东四十条》（平遥拿了两个奖）。
  性格: 喜欢远离人群，在昆明可以三天不出门看书看电影写作。自由至上。
  自我描述: '"我眼里都常含泪水，但是手上也有算盘。"'

social_accounts:
  - platform: 即刻
    name: 梁二狗2dogs
    url: https://m.okjike.com/users/adda4eaa-d9ef-48ca-9194-fa9bc5f31d30
    bio: 跳海酒馆掌柜的，瑜伽习练者

startups:
  - order: 1
    name: 野兽骑行/小蓝单车相关项目
    outcome: 做了半年多帮到20万用户
  - order: 2
    name: 三只熊亲子游
    outcome: ~
  - order: 3
    name: Someet 青年活动社交平台
    outcome: >
      因商业模式问题未成功，但其PMA（兼职活动产品经理）制度
      直接启发了后来的打酒师制度
  - order: 4
    name: 火箭办公（办公SaaS）
    outcome: 2018年被优客工场收购
  - order: 5
    name: 跳海酒馆
    outcome: 2019年至今

key_experiences:
  - >
    大学时在法律援助中心给农民工讨薪、给民办教师打官司，
    发现影响有限，转向用商业做社会改良。
  - >
    大三实习时被带到张向东（久邦数码创始人）的私人party，
    在北京桥头条一个自行车酒吧，三四十人看电影"偷自行车的人"。
    这个场景种下了"酒吧可以聚集人"的种子。
  - >
    2013年开始接触比特币，对去中心化一直有关注。
    打酒师制度类比区块链挖矿的去中心化逻辑。
  - >
    在维也纳皇家歌剧院花18欧买站票，四楼站着听了四小时意大利文歌剧。
    之后在街头喝酒意识到"我的叙事在中国，我的矛盾也在中国，我就得回来"。
  - >
    2019年乐队的夏天第一季的情绪氛围直接影响了开第一家店的决定。
  - >
    精酿啤酒启蒙：第二次创业时期在中关村P2联合创业办公室（地下室），
    每周五去京A喝"断片"等酒，开始理解精酿。
  - >
    Someet的PMA（兼职活动产品经理）制度直接启发了打酒师制度——
    全国几百人的兼职活动经理，教主办人如何破冰、如何让活动更好。
  - >
    年轻时住过很多青旅（中国、日本、欧洲），
    在土耳其一家叫"老陈"的青旅认识了从巴塞罗那骑双层自行车到土耳其的西班牙人。

core_philosophy:
  - "先有人，再有店"
  - "我们是社群运营公司，酒馆是4S店"
  - "把客人当人，而不是计算的结果"
  - "站在阳光照不到的地方呼唤阳光"
  - "用建设替代对抗"
  - "千城万店是本人价值观上反对的"
  - "啤酒是最不应该从口味角度去做营销的"
  - "跳海跟海伦司不在一个行业，跟阿那亚在一个行业"
  - "通过商业去进行某种社会改良"
  - "商业是我们这一代人手上最大的权杖"
  - "创业和创作是人唯二的途径去面对生命的虚无"
  - "保底线争上线——保底线是商业上得成立，争上线是表达融在里面"
  - "我们要做人文主义最后的余火"

three_alternative_careers:
  note: 如果不做跳海想做的三件事（来自播客）
  items:
    - 瑜伽馆——把梵音瑜伽做得"跳海化"
    - 创新教育——像探月学院那样
    - 养老——为不太会有孩子的朋友们做社群式养老
