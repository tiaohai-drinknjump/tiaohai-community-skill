terms:
  - term: 打酒师
    definition: >
      跳海的兼职 bartender。白天可能是设计师、乐手、牙医、幼师，
      晚上来跳海站吧台。不是服务员，更像临时店长——
      可以招待自己朋友、决定当晚音乐、参与经营决策。
      全国注册超过11000人，活跃约1000人。
    see_also: ["实习打酒师", "王者打酒师", "抢单"]

  - term: 实习打酒师
    definition: 打酒师的第一级。试用3次，通过即转正为正式打酒师。

  - term: 王者打酒师
    definition: 打酒师的最高级别，可参与更多经营决策。

  - term: 抢单
    definition: >
      打酒师通过飞书应用"抢"某一天某一店的值班名额。
      类似网约车抢单，先到先得。

  - term: 掌群人
    definition: >
      各城市微信社群的志愿者管理员。跳海有1000+个微信群，
      全由粉丝志愿者管理。每年有"掌群人峰会"交流经验。
      跳海把关键信息发在峰会群，每个掌群人决定具体表达形式发到各自群里。

  - term: 跳海村民
    definition: 对跳海社区所有成员的统称，包括酒客、打酒师、掌群人。

  - term: 夜间光合作用
    definition: >
      跳海的品牌概念。植物白天光合作用，年轻人晚上在跳海进行
      "夜间光合作用"——通过社交、文化活动获取精神能量。

  - term: 酒鬼运动会
    definition: >
      跳海的年度 IP 活动，全国各城市酒客参与的趣味运动比赛。
      北京有酒鬼篮球赛，广州/深圳踢拖鞋比点数，
      杭州金牌键盘手比打字速度，成都立定跳远和桌上冰壶，
      重庆干瞪眼和手指一字马。

  - term: 游牧酒馆
    definition: >
      跳海的特色计划。在非标地区设立临时酒馆，
      已落地泉州浮石隐地、中卫黄河宿集、丽江荒野之国、北京水长城。
      同步开启"游牧打酒师计划"，邀请年轻人驻地一周担任主理人。

  - term: 北二跳
    definition: 跳海在北京安定门的社区店，跳海第二家北京门店。

  - term: 造海计划
    definition: 跳海的城市扩张计划，覆盖北广深、成渝、长三角等区域。

  - term: 勇敢烟蒂机
    definition: >
      跳海门店常设的互动装置。门口设两个选项，
      吸烟的顾客将烟蒂投入对应选项投票。环保+趣味社交。

  - term: 站在背面
    definition: >
      跳海品牌第一大价值观。"站在阳光照不到的地方呼唤阳光，
      站在小众的立场对话主流。"

  - term: 八爪鱼理论
    definition: >
      跳海的管理体系。每家店是八爪鱼的一个触角，
      好事坏事都传回大脑（总部），讨论后形成经验再发回各店。
      A店的经验，B店C店也能用。

  - term: 跳海电波
    definition: >
      跳海出品的播客节目，聚焦不同个体/群体的生活故事。
      最初由三位创始成员（二狗、牌牌、滕滕）制作。

  - term: 跳海Living
    definition: >
      跳海的酒店+长租公寓业务。首个项目在深圳南头古城，
      改造万科泊寓闲置握手楼，含33间青旅房和13间长租公寓。

  - term: 共创小说
    definition: 吧台备小说本，顾客接力编故事。翻到最新页往下写就行。

  - term: 共创歌单
    definition: A4纸贴墙上，顾客手写推荐歌曲，店内播放列表由顾客共同决定。

  - term: 愿望悬赏令
    definition: 客人手写愿望留档，其他客人帮助实现。跳海记录每一个实现过的愿望。

  - term: 跳海春晚
    definition: 年度活动，征集节目、礼品、歌单，由村民共同打造。

  - term: 工地派对
    definition: 新店装修期间用户可认领砖块签名或画像，参与"建造"过程。

  - term: 监工日记
    definition: 新店筹备期间通过群组分享装修进展，让顾客参与设备选择。

  - term: 酒后发言
    definition: UGC征集栏目。

  - term: 有人跳海
    definition: >
      跳海的品牌口号。由发起人之一、摇滚无用电台主播"牌牌"想出，
      源于2019年夏天无数个喝醉跳后海的夜晚，
      代表"决绝的探索、对世界的追问和群体性浪漫"。
      四个字的书法出自上海朋克&民谣音乐人、前顶楼马戏团主唱陆晨之手，
      真迹悬挂在后海店房梁上，全国各店挂复制版。
      也是跳海即刻官方账号的名称。

  - term: 话筒暴力
    definition: >
      梁二狗自创的概念。在封闭空间中谁拿到话筒谁就形成话语霸权，
      在场的人被迫听。所以跳海尽量避免活动中过多"讲"的环节，
      每个活动最多半小时必须"留气口"给卖酒和自由社交。

  - term: 跳海邮局
    definition: >
      跳海的跨城寄信服务。客人在吧台写信/寄东西（如北京的黄叶），
      由兼职"快递员"（出差的客人）人肉带到目标城市。每月有几百封信。

  - term: 涟漪理论
    definition: >
      跳海的品牌传播模型，借鉴Lululemon的"巫师理论"。
      品牌像涟漪：最核心是全职，再往外是参加游牧酒馆的人，
      再外是城市打酒师，再外是办活动的人，最外是普通客户。
      每一层转述者加入自己的故事后能量会叠加。

  - term: 跳海夜校
    definition: >
      在杭州、长沙等地，大概每一两周一次。核心是素人分享，
      不能是知名人士。内容偏体验性：塔罗、滑板、露营、吉他等。
      不向分享者收费也不向用户收费。

  - term: 跳海会客厅
    definition: >
      跳海内部的活动品牌。邀请普通人（如肿瘤科医生）来分享一个小时，
      话题如"喝酒真的致癌"。

  - term: 政委
    definition: >
      跳海各城市设的角色。城市主理人对业务负责（流水、利润、成本），
      "政委"对活动是否符合跳海调性、社群是否过于封闭负责。

  - term: 碰杯时刻
    definition: >
      每天晚上10点，所有打酒师和客人放下手里的事举杯，
      庆祝当晚共同度过的夜晚。

  - term: 周一庇护所
    definition: >
      周一开完周会做不完的工作，大家带电脑去吧台一起加班。

  - term: 打野打酒师
    definition: >
      没有排班但下班后还是来店里待着的打酒师，
      不喝酒也不工作，就是想把自己置于群体之中过公共生活。

  - term: 璀璨钻石打酒师
    definition: 实习三次转正后的正式Title。

  - term: 日神酒神决策法
    definition: >
      跳海内部做重大决定的方式：先喝一顿大酒讨论碰撞达成共识（酒神），
      第二天清醒再投票（日神），两次结果一致就执行。

  - term: 元气弹理论
    definition: >
      梁二狗用七龙珠元气弹比喻跳海——
      自己不是很厉害的创业者，但每个人借一分力就可能一起到达终点。

  - term: B-water
    definition: >
      跳海全职团队的自我定位——"底层水"，做底层建设，
      让更多人走进吧台、让他们的能量更好散发。

  - term: UGP
    definition: >
      User Generated Product（用户生成产品），梁二狗提出。
      区别于UGC，指用户走进吧台共同打造产品并享受收益。

  - term: 二手酒馆
    definition: >
      随易在家开的鸡尾酒Home Bar。"人非常多但酒非常难喝"——
      因为鸡尾酒需要技术，而啤酒"有手就能打"，
      这个对比验证了精酿啤酒能走通跳海模式。

  - term: 杀桶
    definition: 一桶酒喝完叫"杀桶"。长沙店的"愿望井"满了也会"杀桶"共饮。
