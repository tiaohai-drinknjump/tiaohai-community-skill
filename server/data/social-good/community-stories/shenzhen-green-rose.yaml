stories:
  - id: shenzhen-green-rose-ngo
    title: 绿色蔷薇女工NGO合作
    category: charity
    city: 深圳
    store: ~
    date: ~
    type: ongoing
    summary: >
      绿色蔷薇是深圳关注女工的NGO，关注深圳三四十年发展史上
      帮助城市建设但未获得好社会福利的女工。
      做类似工会组织、帮出诗歌集、卖劳动工艺品周边。
      在深圳跳海做小演出和现场诗会，墙上挂有周边代卖。
      该月起全国跳海店铺都有绿色蔷薇产品代卖。
    source:
      - url: ~
        title: '演讲"90%的感情是要分手的"'
    verified: true
    contributed_by: ~
