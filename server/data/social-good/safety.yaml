  - id: nationwide-womens-safety
    title: 女性安全饮酒环境
    category: safety
    city: ~
    store: ~
    date: ~
    type: ongoing
    summary: >
      跳海创造对女性安全的饮酒环境：不推崇劝酒文化，积极反对骚扰行为，
      洗手间内提供卫生用品。打酒师有规矩——"不卖酒给伤心的醉人"。
      运营红线明确禁止鼓酒和划拳。
    source:
      - url: https://pangjing.cn/tiaohai-thetradedesk-2024/
        title: "9000多名打酒师'抢单'，跳海酒馆'量产'文青社交场"
    verified: true
    contributed_by: ~
    extended_note: >
      据播客"人物特写反坛系列"，跳海应该是全国第一个贴出
      明确禁止性骚扰标语的酒馆，公认在去性别化方面做得最好，
      因此女性比例高达约70%。

