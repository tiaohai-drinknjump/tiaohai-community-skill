overview: >
  跳海的社群是品牌的核心。全国有超过1000个微信群，
  分为三类：店面社群（酒客）、兴趣社群（演出/观影/话剧/宠物/市集）、
  活动社群（品牌IP活动后沉淀）。所有群由粉丝志愿者（掌群人）管理。
  两个500人微信群即可支撑一家70-80平店铺的营收天花板。

how_to_join: >
  关注"跳海酒馆"微信公众号，回复你所在的城市名，
  即可获取该城市的社群入口。

group_types:
  - type: 店面群
    description: 以门店为单位，酒客日常聊天、活动通知
  - type: 兴趣群
    description: 跨门店的兴趣社群，如演出、观影、话剧、宠物、市集等
  - type: 活动群
    description: 品牌IP活动后沉淀的社群

official_accounts:
  - platform: 微信公众号
    name: 跳海酒馆
    note: 回复城市名获取社群入口

  - platform: 即刻
    name: 有人跳海
    url: https://m.okjike.com/users/0a9a57c6-08fb-4145-82c9-0adb2c69a648
    note: 品牌官方即刻账号，发布新店、活动、社会倡导等内容

  - platform: 小红书
    name: 待确认
    note: 跳海从未在小红书投放广告，但为小红书酒吧品类讨论度第一，传播全靠用户自发UGC

  - platform: 播客
    name: 跳海电波
    url: https://podcasts.apple.com/my/podcast/跳海电波/id1539404851
    note: 跳海出品播客，聚焦不同个体/群体的生活故事

special_features:
  - name: 跳海邮局
    description: >
      客人在吧台写信/寄东西（如北京的黄叶），
      由兼职"快递员"（出差的客人）人肉带到目标城市。每月有几百封信。

  - name: 愿望箱
    description: >
      吧台上可以写一个愿望（匿名或署名），塞进愿望箱。
      下次别的客人点酒时可以选一个愿望打开，决定是否帮对方实现。

  - name: 共创小说
    description: 吧台备小说本，顾客接力编故事。翻到最新页往下写就行。

  - name: 共创歌单
    description: A4纸贴墙上，顾客手写推荐歌曲，店内播放列表由顾客共同决定。

keeper_system: >
  掌群人是各城市社群的志愿者管理员。
  每年有"掌群人峰会"，由跳海组织全国掌群人交流经验。
